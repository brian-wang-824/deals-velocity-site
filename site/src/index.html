<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The crowd already ordered. We're just counting tickets." />
  <meta name="theme-color" content="#1b1b1e" />
  <title>I'll Have What You're Having</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="rail-shell">
    <div class="rail-bar">
      <div class="rail-brand">
        <div class="site-logo" aria-hidden="true">
          <img src="/assets/logo-mark.svg" alt="" width="28" height="43" />
        </div>
        <div class="rail-brand-copy">
          <h1>I'LL HAVE WHAT YOU'RE HAVING</h1>
          <p>The crowd already ordered. We're just counting tickets.</p>
        </div>
      </div>

      <div class="rail-controls" aria-label="Deal controls">
        <label class="sr-only" for="search">Search deals or stores</label>
        <input
          id="search"
          type="search"
          placeholder="search deals or stores…"
          class="rail-search"
        />

        <label class="sr-only" for="posted-window">Posted time window</label>
        <select id="posted-window" class="rail-select">
          <option value="3h">Posted: 3 hours</option>
          <option value="6h">Posted: 6 hours</option>
          <option value="9h">Posted: 9 hours</option>
          <option value="12h" selected>Posted: 12 hours</option>
          <option value="24h">Posted: 24 hours</option>
        </select>

        <label class="sr-only" for="sort">Sort tickets</label>
        <select id="sort" class="rail-select">
          <option value="velocity">Sort: Pace</option>
          <option value="votes">Sort: Tally</option>
          <option value="posted">Sort: Newest</option>
        </select>
      </div>
    </div>

    <div class="rail-status">
      <div id="results-meta" aria-live="polite"></div>
      <div class="rail-update">
        <span id="last-updated"></span>
        <span id="next-refresh"></span>
      </div>
    </div>
  </header>

  <main class="ticket-counter">
    <div id="deals-list" class="ticket-grid"></div>
    <nav id="pagination" class="pagination" aria-label="Ticket pages"></nav>
  </main>

  <script src="/app.js"></script>
</body>
</html>
