<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I'll Have What You're Having In</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100 antialiased">
  <header class="border-b border-zinc-800 bg-zinc-950/95">
    <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 sm:py-5 lg:px-8">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between sm:gap-4">
        <div class="flex min-w-0 items-start gap-3 sm:gap-4">
          <div class="site-logo" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img">
              <path d="M10 14a8 8 0 0 1 8-8h12a8 8 0 0 1 8 8v20a8 8 0 0 1-8 8H18a8 8 0 0 1-8-8V14Z" />
              <path d="M16 17h16M16 24h10M16 31h16" />
              <circle cx="33" cy="15" r="5" />
              <path d="m30.5 15 1.8 1.8 3.4-4" />
            </svg>
          </div>
          <div class="min-w-0">
            <h1 class="max-w-64 text-[1.85rem] font-semibold leading-[1.05] text-white sm:max-w-none sm:text-4xl">I'll have what you're having</h1>
            <p class="mt-2 max-w-[18rem] text-sm leading-5 text-zinc-400 sm:max-w-2xl">The crowd is already pointing at the good stuff. We just check the pulse.</p>
          </div>
        </div>
        <div class="flex flex-wrap items-center gap-x-2 gap-y-1 pl-[3.75rem] text-xs text-zinc-500 sm:block sm:shrink-0 sm:pl-0 sm:text-right sm:text-sm">
          <div id="last-updated"></div>
          <div id="next-refresh" class="font-medium text-zinc-300"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-4 sm:px-6 sm:py-6 lg:px-8">
    <div class="mb-4 grid grid-cols-2 gap-2 sm:mb-5 sm:gap-3 lg:grid-cols-[1fr_auto_auto]">
      <input
        id="search"
        type="search"
        placeholder="Search deals or stores..."
        class="control-field col-span-2 lg:col-span-1"
      />
      <select id="velocity-filter" class="control-field">
        <option value="all">All velocities</option>
        <option value="surging">Surging</option>
        <option value="hot">Hot</option>
        <option value="warming">Warming</option>
        <option value="slow">Slow</option>
        <option value="flat">Flat</option>
        <option value="cooling">Cooling</option>
      </select>
      <select id="sort" class="control-field">
        <option value="velocity">Sort: Velocity</option>
        <option value="votes">Sort: Votes</option>
        <option value="comments">Sort: Comments</option>
        <option value="title">Sort: Title</option>
        <option value="posted">Sort: Newest</option>
      </select>
    </div>

    <div id="results-meta" class="mb-3 text-xs font-medium uppercase tracking-[0.14em] text-zinc-500"></div>
    <div id="deals-list" class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5"></div>
    <div id="pagination" class="mt-8 flex flex-wrap items-center justify-center gap-2"></div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
