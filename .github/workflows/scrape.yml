name: Scrape deals

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-scraper.txt

      - name: Install scraper dependencies
        run: pip install -r requirements-scraper.txt

      - name: Run scrape
        run: python scripts/run_scrape.py

      - name: Commit updated data
        run: |
          git config user.name "deals-bot"
          git config user.email "deals-bot@users.noreply.github.com"
          git add site/public/data/history.json site/public/data/deals.json
          git diff --staged --quiet || git commit -m "chore: update deals snapshot [skip ci]"
          git push
