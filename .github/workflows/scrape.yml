name: Scrape deals

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-scraper.txt

      - name: Install scraper dependencies
        run: pip install -r requirements-scraper.txt

      - name: Run scrape
        env:
          SUPABASE_DEAL_DATA_FUNCTION_URL: ${{ secrets.SUPABASE_DEAL_DATA_FUNCTION_URL }}
          DEAL_DATA_PUBLISH_SECRET: ${{ secrets.DEAL_DATA_PUBLISH_SECRET }}
          SUPABASE_NOTIFICATION_PROCESS_URL: ${{ secrets.SUPABASE_NOTIFICATION_PROCESS_URL }}
          SCRAPE_DISPATCH_SECRET: ${{ secrets.SCRAPE_DISPATCH_SECRET }}
        run: python scripts/run_scrape.py
