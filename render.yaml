services:
  - type: web
    name: deals-velocity-site
    runtime: static
    buildCommand: cd site && npm install && npm run build
    staticPublishPath: site/dist
    envVars:
      - key: SUPABASE_NOTIFICATION_FUNCTION_URL
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /data/*.json
        name: Cache-Control
        value: no-cache
